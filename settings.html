<div id="imd-settings-panel">


<h3>
Immersive Music Dock
</h3>



<hr>


<h4>
基础设置
</h4>



<label>

<input 
type="checkbox"
id="imd-enabled">

启用 Immersive Music Dock

</label>



<br><br>



<label>

<input
type="checkbox"
id="imd-auto-music">

角色切换自动寻找音乐

</label>



<br>



<label>

<input
type="checkbox"
id="imd-auto-next">

歌曲结束自动寻找下一首

</label>



<br>



<label>

<input
type="checkbox"
id="imd-hide-units">

隐藏 s / t / # 单位符号

</label>



<hr>





<h4>
音量
</h4>



<input

type="range"

id="imd-volume"

min="0"

max="1"

step="0.05"

value="0.7"

>



<hr>





<h4>
绑定美化
</h4>


<p>
插件只会在绑定的美化中开启。
</p>



<div id="imd-theme-container">

</div>



<button
id="imd-scan-theme">

扫描当前美化

</button>



<hr>





<h4>
备用音乐 URL

</h4>


<p>

搜索失败时使用。

最多5个。

</p>




<input

class="text_pole"

id="imd-backup-1"

placeholder="备用音乐 URL 1">


<br>


<input

class="text_pole"

id="imd-backup-2"

placeholder="备用音乐 URL 2">


<br>


<input

class="text_pole"

id="imd-backup-3"

placeholder="备用音乐 URL 3">


<br>


<input

class="text_pole"

id="imd-backup-4"

placeholder="备用音乐 URL 4">


<br>


<input

class="text_pole"

id="imd-backup-5"

placeholder="备用音乐 URL 5">



<br><br>



<button

id="imd-save-backup">

保存备用音乐

</button>




<hr>





<h4>

音乐搜索接口

</h4>



<p>

可选。

留空则使用备用 URL。

</p>



<input

class="text_pole"

id="imd-music-api"

placeholder="API URL">



<br><br>



<button

id="imd-test-music">

测试音乐

</button>




<hr>




<h4>

说明

</h4>



<p>

角色头像点击：
上一首

</p>



<p>

用户头像点击：
下一首

</p>



<p>

所有元素均支持 CSS 自定义。

</p>



</div>
